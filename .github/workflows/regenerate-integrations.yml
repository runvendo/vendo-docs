name: regenerate-integrations

# Re-runs scripts/build-integrations.mjs and opens a PR if the rendered
# MDX has drifted from what's committed.
#
# Triggers:
#   - repository_dispatch from runvendo/vendo (event_type=integrations-changed)
#     — fires within minutes of a catalog.yaml change in the monorepo.
#   - Weekly cron backstop in case the dispatch path is ever silenced
#     (e.g. PAT expires) or an out-of-band DB env_bootstrap change lands.
#   - workflow_dispatch for manual / on-demand re-runs.
#
# Required secrets (set in repo Settings → Secrets → Actions):
#   VENDO_MONOREPO_READ_PAT — fine-grained PAT with `contents: read` on
#       runvendo/vendo (the monorepo is private). Used to clone packages/
#       integrations/ for catalog.json source-of-truth.
#   INFISICAL_SERVICE_TOKEN — Infisical service token with read access to
#       the vendo project's prod environment. Used to resolve DATABASE_URL
#       for the env_bootstrap snapshot. Drop once env_bootstrap moves into
#       catalog.yaml (TODO #2 in scripts/build-integrations.mjs).
#
# The PR is opened against `main` with a `auto/integrations-regen-*` branch.
# It uses the default GITHUB_TOKEN — that means PR-opened CI won't trigger
# (GitHub's loop-prevention), which is fine since vendo-docs has no PR-gated
# CI today; CF Pages deploys on merge to main.

on:
  repository_dispatch:
    types: [integrations-changed]
  schedule:
    # Mondays at 06:00 UTC — backstop for missed dispatches / out-of-band changes.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

concurrency:
  group: regenerate-integrations
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vendo-docs
        uses: actions/checkout@v4

      - name: Checkout runvendo/vendo (monorepo, sparse — integrations only)
        uses: actions/checkout@v4
        with:
          repository: runvendo/vendo
          token: ${{ secrets.VENDO_MONOREPO_READ_PAT }}
          path: monorepo
          sparse-checkout: |
            packages/integrations
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install vendo-docs deps
        run: npm ci

      - name: Install postgres client
        run: sudo apt-get install -y postgresql-client

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Regenerate integration MDX
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
          VENDO_INTEGRATIONS_DIR: ${{ github.workspace }}/monorepo/packages/integrations
        run: |
          infisical run --env prod --projectId b366cac7-1716-47a0-9617-f335500f6dee --token "$INFISICAL_TOKEN" -- \
            node scripts/build-integrations.mjs

      - name: Detect diff
        id: diff
        run: |
          if [ -n "$(git status --porcelain content/docs/integrations)" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat content/docs/integrations
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            echo "No diff — integration pages are up to date."
          fi

      - name: Verify build still passes (only if diff)
        if: steps.diff.outputs.has_diff == 'true'
        run: npm run build

      - name: Open PR with regenerated MDX
        if: steps.diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_SHA: ${{ github.event.client_payload.sha }}
          TRIGGER: ${{ github.event_name }}
        run: |
          BRANCH="auto/integrations-regen-${{ github.run_id }}"
          git config user.name "vendo-docs-bot"
          git config user.email "bot@vendo.run"
          git checkout -b "$BRANCH"
          git add content/docs/integrations
          git commit -m "integrations: auto-regenerated from upstream catalog change"
          git push origin "$BRANCH"
          BODY="Auto-regenerated by \`regenerate-integrations\` (trigger: \`${TRIGGER}\`)."
          if [ -n "$UPSTREAM_SHA" ]; then
            BODY="${BODY}"$'\n\n'"Upstream commit: \`runvendo/vendo@${UPSTREAM_SHA}\`."
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "integrations: auto-regenerated from upstream" \
            --body "$BODY"
