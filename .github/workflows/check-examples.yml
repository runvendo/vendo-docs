name: docs-examples-ci

on:
  pull_request:
    paths:
      - "content/docs/guides/recipes/**"
      - "scripts/check-examples/**"
      - ".github/workflows/check-examples.yml"
  push:
    branches: [main]
    paths:
      - "content/docs/guides/recipes/**"
      - "scripts/check-examples/**"
      - ".github/workflows/check-examples.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: bash scripts/check-examples/run.sh
